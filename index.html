<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSSR Révision — Réseaux, Infrastructure & Sécurité</title>
    <meta name="description" content="Application de révision pour techniciens TSSR : Base des réseaux, Infrastructure Cisco IOS, Réseaux et Sécurité. Leçons, quiz et flashcards interactifs.">
    <!-- CSS -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="container header-content">
            <h1>TSSR Révision</h1>
            <nav aria-label="Navigation principale">
                <button class="nav-btn active" data-view="dashboard" aria-current="page">Dashboard</button>
                <button class="nav-btn" data-view="lesson">Leçon</button>
                <button class="nav-btn" data-view="quiz">Quiz</button>
                <button class="nav-btn" data-view="flashcards">Flashcards</button>
            </nav>
            <div id="global-progress" class="global-progress" aria-live="polite">
                <span class="progress-text">Progression: 0%</span>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>
        </div>
    </header>

    <main id="app-content" class="container">
        <!-- Views will be dynamically injected here by app.js -->
    </main>

    <footer class="app-footer">
        <div class="container">
            <p>&copy; 2026 TSSR Révision. Développé pour les Techniciens Systèmes et Réseaux.</p>
        </div>
    </footer>

    <!-- App Scripts (ES6 Modules) -->
    <script type="module" src="src/app.js"></script>
</body>
</html>
